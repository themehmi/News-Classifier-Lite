<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Classifier Lite</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #0a0a0a;
            --border: #1f1f1f;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), 
                        url('https://images.unsplash.com/photo-1495020689067-958852a7765e?q=80&w=2670&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, system-ui, sans-serif;
            color: var(--text-main);
            padding: 20px;
        }

        .github-corner {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            text-decoration: none;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.85rem;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 480px;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        h2 { margin: 0 0 20px 0; font-size: 1.5rem; }

        .scope-box {
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 25px;
        }

        .scope-label {
            color: var(--text-dim);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 10px;
        }

        .cat-tag {
            display: inline-block;
            font-size: 0.65rem;
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 3px 8px;
            border-radius: 5px;
            margin: 2px;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 1rem;
            resize: none;
            box-sizing: border-box;
            outline: none;
        }

        button {
            width: 100%;
            background: white;
            color: black;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
        }

        .result-box {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid var(--border);
        }

        .result-label { color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; }
        .result-value { font-size: 1.4rem; font-weight: 600; margin-top: 5px; }

        @media (max-width: 480px) {
            .github-corner span { display: none; }
        }
    </style>
</head>
<body>

    <a href="https://github.com/themehmi/News-Classifier-Lite" target="_blank" class="github-corner">
        <svg height="18" viewBox="0 0 16 16" width="18" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
        <span>Source</span>
    </a>

    <div class="container">
        <h2>News Classifier Lite</h2>
        
        <div class="scope-box">
            <span class="scope-label">Limited To 4 Categories:</span>
            {% for cat in categories %}
                <span class="cat-tag">{{ cat }}</span>
            {% endfor %}
        </div>

        <form action="/predict" method="POST">
            <textarea name="news_text" placeholder="Paste news snippet here..." required>{{ original_text if original_text }}</textarea>
            <button type="submit">Identify Category</button>
        </form>

        {% if prediction %}
        <div class="result-box">
            <span class="result-label">AI Classification</span>
            <div class="result-value">{{ prediction }}</div>
        </div>
        {% endif %}

        {% if error %}
        <div style="color: #ff4b4b; margin-top: 20px; font-size: 0.9rem;">{{ error }}</div>
        {% endif %}
    </div>

</body>
</html>
