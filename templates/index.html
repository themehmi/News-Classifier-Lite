<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Classifier Lite</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #0a0a0a;
            --border: #1f1f1f;
            --text-main: #ffffff;
            --text-dim: #888888;
            --accent: #ffffff;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), 
            url('https://images.unsplash.com/photo-1495020689067-958852a7765e?q=80&w=2670&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            box-sizing: border-box;
            position: relative; /* Needed for absolute positioning of the button */
        }

        /* Top Right GitHub Button */
        .github-corner {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            color: var(--text-main);
            text-decoration: none;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .github-corner:hover {
            background-color: var(--text-main);
            color: #000;
            border-color: var(--text-main);
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 480px;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            box-sizing: border-box;
        }

        header {
            text-align: left;
            margin-bottom: 25px;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .category-wrapper {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .cat-tag {
            font-size: 0.7rem;
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        textarea {
            width: 100%;
            height: 150px;
            background-color: #000;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            color: var(--text-main);
            font-size: 1rem;
            line-height: 1.5;
            resize: none;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: #444;
        }

        button {
            width: 100%;
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        button:hover {
            opacity: 0.9;
        }

        .result-container {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid var(--border);
            text-align: left;
        }

        .result-title {
            color: var(--text-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            display: block;
        }

        .result-output {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-main);
        }

        @media (max-width: 480px) {
            .github-corner {
                top: 10px;
                right: 10px;
                padding: 6px 10px;
                font-size: 0.75rem;
            }
            .container { padding: 20px; }
            h2 { font-size: 1.25rem; }
            textarea { height: 120px; }
            .result-output { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <!-- Top Right Corner GitHub Button -->
    <a href="https://github.com/themehmi/News-Classifier-Lite" target="_blank" class="github-corner">
        <svg height="18" viewBox="0 0 16 16" width="18" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
        </svg>
        <span>Source</span>
    </a>

    <div class="container">
        <header>
            <h2>News Classifier Lite</h2>
            <div class="category-wrapper">
                <span>Limited To 4 Categories:</span>
                {% for cat in categories %}
                    <span class="cat-tag">{{ cat }}</span>
                {% endfor %}
            </div>
        </header>
        
        <form action="/predict" method="POST">
            <textarea name="news_text" placeholder="Start typing news..." required>{{ original_text if original_text }}</textarea>
            <button type="submit">Identify Category</button>
        </form>

        {% if prediction %}
        <div class="result-container">
            <span class="result-title">AI Classification</span>
            <div class="result-output">{{ prediction }}</div>
        </div>
        {% endif %}
    </div>

</body>
</html>
