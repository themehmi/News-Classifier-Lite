<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Classifier Lite</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #0a0a0a;
            --border: #1f1f1f;
            --text-main: #ffffff;
            --text-dim: #888888;
            --accent: #ffffff;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), 
            url('https://images.unsplash.com/photo-1495020689067-958852a7765e?q=80&w=2670&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px; /* Prevents card from touching screen edges on mobile */
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 480px; /* Increased slightly for better desktop feel */
            padding: 30px; /* Responsive padding */
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            box-sizing: border-box;
        }

        header {
            text-align: left;
            margin-bottom: 25px;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .category-wrapper {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .cat-tag {
            font-size: 0.7rem;
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        textarea {
            width: 100%;
            height: 150px;
            background-color: #000;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            color: var(--text-main);
            font-size: 1rem;
            line-height: 1.5;
            resize: none;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: #444;
        }

        button {
            width: 100%;
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        button:hover {
            opacity: 0.9;
        }

        .result-container {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid var(--border);
            text-align: left;
        }

        .result-title {
            color: var(--text-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            display: block;
        }

        .result-output {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Responsive Adjustments for Small Screens */
        @media (max-width: 480px) {
            .container {
                padding: 20px; /* Slimmer padding for small phones */
            }
            
            h2 {
                font-size: 1.25rem;
            }

            textarea {
                height: 120px; /* Shorter textarea on small screens */
            }

            .result-output {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h2>News Classifier Lite</h2>
            <div class="category-wrapper">
                <span>Limited To 4 Categories:</span>
                {% for cat in categories %}
                    <span class="cat-tag">{{ cat }}</span>
                {% endfor %}
            </div>
        </header>
        
        <form action="/predict" method="POST">
            <textarea name="news_text" placeholder="Start typing news..." required>{{ original_text if original_text }}</textarea>
            <button type="submit">Identify Category</button>
        </form>

        {% if prediction %}
        <div class="result-container">
            <span class="result-title">AI Classification</span>
            <div class="result-output">{{ prediction }}</div>
        </div>
        {% endif %}
    </div>

</body>
</html>
